name: Build LiveKit GDExtension (Android)

on:
  push:
    branches: [main, dev]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: "25.2.9519653"

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  #  1. Build OpenSSL for Android (arm64-v8a + x86_64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-openssl:
    name: "OpenSSL for Android"
    runs-on: ubuntu-22.04

    steps:
      - name: Cache OpenSSL
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: openssl-android
          key: openssl-android-3.3.1

      - name: Install deps
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y curl perl make

      - name: Set up Java 17
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK + NDK
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Build OpenSSL for Android
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}
          export ANDROID_NDK_ROOT=$NDK_ROOT
          export PATH=$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          curl -fsSL https://www.openssl.org/source/openssl-3.3.1.tar.gz -o openssl.tar.gz
          tar -xzf openssl.tar.gz
          cd openssl-3.3.1

          # arm64-v8a
          ./Configure android-arm64 -D__ANDROID_API__=26 --prefix=$GITHUB_WORKSPACE/openssl-android/arm64-v8a no-shared no-tests
          make -j$(nproc)
          make install_sw
          make clean

          # x86_64
          ./Configure android-x86_64 -D__ANDROID_API__=26 --prefix=$GITHUB_WORKSPACE/openssl-android/x86_64 no-shared no-tests
          make -j$(nproc)
          make install_sw

      - name: Upload OpenSSL artifact
        uses: actions/upload-artifact@v4
        with:
          name: openssl-android
          path: openssl-android/
          retention-days: 1


  # ─────────────────────────────────────────────────────────────────────────────
  #  2. Build LiveKit C++ SDK for Android
  # ─────────────────────────────────────────────────────────────────────────────
  build-livekit-sdk:
    name: "LiveKit SDK for Android"
    runs-on: ubuntu-22.04
    needs: build-openssl

    steps:
      - name: Cache LiveKit SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: livekit-sdk-build
          key: livekit-sdk-android-main-${{ runner.arch }}

      - name: Install deps
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build pkg-config libva-dev libdrm-dev libx11-dev libxext-dev libxfixes-dev libpulse-dev libasound2-dev curl build-essential

      - name: Set up Rust
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Set up Java 17
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK + NDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Configure Rust for Android cross-compile
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}
          LLVM_BIN=$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$LLVM_BIN/aarch64-linux-android26-clang"
          ar = "$LLVM_BIN/llvm-ar"

          [target.x86_64-linux-android]
          linker = "$LLVM_BIN/x86_64-linux-android26-clang"
          ar = "$LLVM_BIN/llvm-ar"
          EOF

      - name: Checkout LiveKit C++ SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: livekit/client-sdk-cpp
          ref: main
          path: livekit-sdk-src
          submodules: recursive
          fetch-depth: 0

      - name: Download OpenSSL
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: openssl-android
          path: openssl-android/

      - name: Build SDK arm64-v8a
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}
          OPENSSL=$GITHUB_WORKSPACE/openssl-android/arm64-v8a
          cmake -S livekit-sdk-src -B livekit-sdk-src/build-arm64 -G Ninja -DCMAKE_TOOLCHAIN_FILE=$NDK_ROOT/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-26 -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR=$OPENSSL -DOPENSSL_INCLUDE_DIR=$OPENSSL/include -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL/lib/libcrypto.a -DOPENSSL_SSL_LIBRARY=$OPENSSL/lib/libssl.a -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/livekit-sdk-build/arm64-v8a
          cmake --build livekit-sdk-src/build-arm64 --parallel
          cmake --install livekit-sdk-src/build-arm64

      - name: Build SDK x86_64
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}
          OPENSSL=$GITHUB_WORKSPACE/openssl-android/x86_64
          cmake -S livekit-sdk-src -B livekit-sdk-src/build-x86_64 -G Ninja -DCMAKE_TOOLCHAIN_FILE=$NDK_ROOT/build/cmake/android.toolchain.cmake -DANDROID_ABI=x86_64 -DANDROID_PLATFORM=android-26 -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR=$OPENSSL -DOPENSSL_INCLUDE_DIR=$OPENSSL/include -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL/lib/libcrypto.a -DOPENSSL_SSL_LIBRARY=$OPENSSL/lib/libssl.a -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/livekit-sdk-build/x86_64
          cmake --build livekit-sdk-src/build-x86_64 --parallel
          cmake --install livekit-sdk-src/build-x86_64

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: livekit-sdk-android
          path: livekit-sdk-build/
          retention-days: 1


  # ─────────────────────────────────────────────────────────────────────────────
  #  3. Build GDExtension for Android
  # ─────────────────────────────────────────────────────────────────────────────
  build-extension:
    name: "Extension • ${{ matrix.name }}"
    runs-on: ubuntu-22.04
    needs: build-livekit-sdk
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: android-arm64-release
            target: template_release
            android_arch: arm64v8
          - name: android-arm64-debug
            target: template_debug
            android_arch: arm64v8
          - name: android-x86_64-release
            target: template_release
            android_arch: x86_64

    steps:
      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download LiveKit SDK
        uses: actions/download-artifact@v4
        with:
          name: livekit-sdk-android
          path: livekit-sdk-build/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: pip install scons==4.6.0

      - name: SCons cache
        uses: actions/cache@v4
        with:
          path: .scons-cache/
          key: scons-${{ matrix.name }}-${{ hashFiles('src/**', 'include/**', 'SConstruct') }}
          restore-keys: scons-${{ matrix.name }}-

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Build
        env:
          LIVEKIT_SDK: ${{ github.workspace }}/livekit-sdk-build
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          SCONS_CACHE: .scons-cache/
        run: |
          scons platform=android target=${{ matrix.target }} android_arch=${{ matrix.android_arch }} ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }} -j4

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: gdext-${{ matrix.name }}
          path: godot_project/addons/livekit/bin/
          if-no-files-found: error


  # ─────────────────────────────────────────────────────────────────────────────
  #  4. Package final addon zip
  # ─────────────────────────────────────────────────────────────────────────────
  package:
    name: "Package addon"
    runs-on: ubuntu-22.04
    needs: build-extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all libraries
        uses: actions/download-artifact@v4
        with:
          pattern: gdext-*
          path: collected-libs/
          merge-multiple: true

      - name: Assemble addon
        run: |
          mkdir -p addon-package/addons/livekit/bin
          cp godot_project/addons/livekit/livekit.gdextension addon-package/addons/livekit/
          cp godot_project/addons/livekit/plugin.cfg addon-package/addons/livekit/
          cp godot_project/LiveKitVoiceChat.gd addon-package/addons/livekit/
          cp -r collected-libs/* addon-package/addons/livekit/bin/
          find addon-package -type f | sort

      - name: Zip addon
        run: cd addon-package && zip -r ../livekit-gdextension-android-${{ github.ref_name }}.zip .

      - name: Upload addon zip
        uses: actions/upload-artifact@v4
        with:
          name: livekit-gdextension-android
          path: livekit-gdextension-android-*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: livekit-gdextension-android-*.zip
          generate_release_notes: true
